<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f4;}
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white;}
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #007bff; color: white; }
        .btn { padding: 8px 12px; text-decoration: none; color: white; border-radius: 4px; display: inline-block;}
        .btn-nuevo { background-color: #28a745; margin-bottom: 10px;}
        .btn-editar { background-color: #ffc107; color: black;}
        .btn-eliminar { background-color: #dc3545; }
    </style>
</head>
<body>
<h2>Gestión de Usuarios</h2>
<a th:href="@{/usuarios/nuevo}" class="btn btn-nuevo">Agregar Nuevo Usuario</a>
<a th:href="@{/principal}" class="btn" style="background-color: gray;">Volver al Menú</a>
<table>
    <thead>
    <tr><th>ID</th><th>Nombre de Usuario</th><th>Rol</th><th>Acciones</th></tr>
    </thead>
    <tbody>
    <tr th:each="user : ${listaUsuarios}">
        <td th:text="${user.id}"></td>
        <td th:text="${user.usuario}"></td>
        <td th:text="${user.rol}"></td>
        <td>
            <a th:href="@{/usuarios/editar/{id}(id=${user.id})}" class="btn btn-editar">Editar</a>
            <a th:href="@{/usuarios/eliminar/{id}(id=${user.id})}" class="btn btn-eliminar" onclick="return confirm('¿Seguro de eliminar este usuario?');">Eliminar</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
