<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Punto de Venta</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f4; }
        .panel { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); margin-bottom: 20px;}
        select, input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;}
        .btn { padding: 10px 20px; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; text-decoration: none;}
        .btn-vender { background-color: #28a745; width: 100%; font-weight: bold;}
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white;}
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #343a40; color: white; }
        .alerta { padding: 10px; border-radius: 5px; margin-bottom: 15px; font-weight: bold; }
        .alerta-exito { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alerta-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

<a th:href="@{/principal}" class="btn" style="background-color: gray; margin-bottom: 20px; display: inline-block;">⬅ Volver al Menú</a>

<div th:if="${param.exito}" class="alerta alerta-exito">¡Venta realizada con éxito! El stock ha sido descontado.</div>
<div th:if="${param.error != null and param.error[0] == 'stock'}" class="alerta alerta-error">Error: No hay stock suficiente para realizar la venta.</div>

<div class="panel">
    <h2>Punto de Venta 🛒</h2>
    <form th:action="@{/ventas/procesar}" method="post">

        <label>Selecciona el Cliente:</label>
        <select name="idCliente" required>
            <option value="" disabled selected>-- Elige un cliente --</option>
            <option th:each="cliente : ${clientes}" th:value="${cliente.idCliente}" th:text="${cliente.nombre}"></option>
        </select>

        <label>Selecciona el Producto:</label>
        <select name="productoSeleccionado" required>
            <option value="" disabled selected>-- Elige un juego o consola --</option>
            <optgroup label="Videojuegos">
                <option th:each="v : ${videojuegos}" th:value="'V-' + ${v.idVideojuego}" th:text="${v.nombre} + ' - $' + ${v.precio} + ' (Stock: ' + ${v.stock} + ')'"></option>
            </optgroup>
            <optgroup label="Consolas">
                <option th:each="c : ${consolas}" th:value="'C-' + ${c.idConsola}" th:text="${c.nombre} + ' - $' + ${c.precio} + ' (Stock: ' + ${c.stock} + ')'"></option>
            </optgroup>
        </select>

        <label>Cantidad a Vender:</label>
        <input type="number" name="cantidad" min="1" required placeholder="Ej: 2">

        <button type="submit" class="btn btn-vender">Realizar Venta y Cobrar</button>
    </form>
</div>

<div class="panel">
    <h2>Historial de Ventas 🧾</h2>
    <table>
        <thead>
        <tr><th>ID Ticket</th><th>Fecha</th><th>Cliente</th><th>Producto</th><th>Cant.</th><th>Total</th></tr>
        </thead>
        <tbody>
        <tr th:each="venta : ${historialVentas}">
            <td th:text="${venta.idVenta}"></td>
            <td th:text="${#temporals.format(venta.fecha, 'dd/MM/yyyy HH:mm')}"></td>
            <td th:text="${venta.cliente}"></td>
            <td th:text="${venta.producto}"></td>
            <td th:text="${venta.cantidad}"></td>
            <td th:text="${'$' + venta.total}"></td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
