<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Control Dashboard - Metricas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; padding: 20px; }
        .header-dash { display: flex; justify-content: space-between; align-items: center; background: #343a40; color: white; padding: 15px 25px; border-radius: 8px; margin-bottom: 20px;}
        .kpi-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .kpi-box { flex: 1; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; border-left: 5px solid #007bff; }
        .kpi-value { font-size: 36px; font-weight: bold; margin-top: 10px; }
        .alerta-roja { color: #dc3545; }
        .alerta-verde { color: #28a745; }
        .charts-container { display: flex; gap: 20px; flex-wrap: wrap; }
        .chart-box { flex: 1; background: white; padding: 20px; border-radius: 8px; min-width: 45%; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
        .btn-volver { background: #007bff; color: white; padding: 8px 15px; text-decoration: none; border-radius: 4px; margin-left: 15px; }
    </style>
</head>
<body>

<div class="header-dash">
    <h2>Control Dashboard - Tech Solutions</h2>
    <div>
        <label style="margin-right: 10px;">Filtro de Informacion: </label>
        <select id="filtroModulo" onchange="dibujarTreemap()">
            <option value="todos">Todos los Modulos</option>
            <option value="ventas">Modulo de Ventas (Ventas y Clientes)</option>
            <option value="inventario">Modulo de Inventario (Juegos y Consolas)</option>
        </select>
        <a th:href="@{/principal}" class="btn-volver">Volver al Menu</a>
    </div>
</div>

<div class="kpi-container">
    <div class="kpi-box" style="border-left-color: #ffc107;">
        <h3>WIP (Work In Progress)</h3>
        <div class="kpi-value" th:classappend="${wipActual > 3} ? 'alerta-roja' : 'alerta-verde'" th:text="${wipActual}"></div>
        <p style="color: #6c757d; font-size: 14px;">Umbral maximo: 3 tareas simultaneas</p>
    </div>
    <div class="kpi-box" style="border-left-color: #17a2b8;">
        <h3>Complejidad Ciclomatica Promedio</h3>
        <div class="kpi-value" th:classappend="${complejidadPromedio > 10} ? 'alerta-roja' : 'alerta-verde'" th:text="${complejidadPromedio}"></div>
        <p style="color: #6c757d; font-size: 14px;">Umbral maximo: 10 caminos logicos</p>
    </div>
</div>

<div class="charts-container">
    <div class="chart-box">
        <h3 style="margin-bottom: 15px; color: #333;">Diagrama de Flujo Acumulado (CFD)</h3>
        <canvas id="cfdChart" height="180"></canvas>
    </div>

    <div class="chart-box">
        <h3 style="margin-bottom: 15px; color: #333;">Mapa de Complejidad (Treemap)</h3>
        <div id="treemap_div" style="width: 100%; height: 320px;"></div>
    </div>
</div>

<script th:inline="javascript">
    // --- 1. GRAFICA CFD (CHART.JS) ---
    const ctx = document.getElementById('cfdChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['Dia 1', 'Dia 2', 'Dia 3', 'Dia 4', 'Dia 5 (Cuello de Botella)', 'Dia 6', 'Hoy'],
            datasets: [
                { label: 'Terminado (Done)', data: [2, 4, 6, 8, 8, 12, 14], backgroundColor: 'rgba(40, 167, 69, 0.6)', fill: true, tension: 0.3 },
                { label: 'En Progreso (WIP)', data: [4, 6, 8, 10, 15, 14, 16], backgroundColor: 'rgba(255, 193, 7, 0.6)', fill: '-1', tension: 0.3 },
                { label: 'Por Hacer (To Do)', data: [12, 14, 16, 18, 18, 18, 18], backgroundColor: 'rgba(108, 117, 125, 0.6)', fill: '-1', tension: 0.3 }
            ]
        },
        options: {
            responsive: true,
            plugins: { tooltip: { mode: 'index', intersect: false } },
            scales: { y: { stacked: false, title: { display: true, text: 'Cantidad de Tareas' } } },
            elements: { point: { radius: 2 } }
        }
    });

    // --- 2. MAPA DE ARBOL CON FILTRO DINAMICO (GOOGLE CHARTS) ---
    google.charts.load('current', {'packages':['treemap']});
    google.charts.setOnLoadCallback(dibujarTreemap);

    function dibujarTreemap() {
        // Obtenemos el valor del filtro seleccionado (todos, ventas, inventario)
        var filtro = document.getElementById('filtroModulo').value;

        // Extraemos los datos que manda Java desde el Controlador
        var compVentas = /*[[${complejidadVentas}]]*/ 8;
        var compUsers = /*[[${complejidadUsuarios}]]*/ 1;
        var compClient = /*[[${complejidadClientes}]]*/ 1;
        var compVid = /*[[${complejidadVideojuegos}]]*/ 1;
        var compConsolas = /*[[${complejidadConsolas}]]*/ 1;

        // Arreglo base que siempre debe ir
        var filasData = [
            ['Clase', 'Padre', 'Lineas de Codigo (Tamano)', 'Complejidad (Color)'],
            ['Backend Java', null, 0, 0]
        ];

        // LOGICA DEL FILTRO: Agregamos controladores segun lo que elija el usuario en el select
        if (filtro === 'todos' || filtro === 'ventas') {
            filasData.push(['VentaController', 'Backend Java', 65, compVentas]);
            filasData.push(['ClienteController', 'Backend Java', 42, compClient]);
        }
        if (filtro === 'todos') {
            filasData.push(['UsuarioController', 'Backend Java', 43, compUsers]);
        }
        if (filtro === 'todos' || filtro === 'inventario') {
            filasData.push(['VideojuegoController', 'Backend Java', 42, compVid]);
            filasData.push(['ConsolaController', 'Backend Java', 42, compConsolas]);
        }

        // Convertimos el arreglo filtrado en una tabla de Google Charts
        var data = google.visualization.arrayToDataTable(filasData);

        var tree = new google.visualization.TreeMap(document.getElementById('treemap_div'));
        tree.draw(data, {
            minColor: '#28a745',
            midColor: '#ffc107',
            maxColor: '#dc3545',
            headerHeight: 30,
            fontColor: 'black',
            showScale: true,
            generateTooltip: showFullTooltip
        });

        function showFullTooltip(row, size, value) {
            return '<div style="background:#fff; padding:10px; border:1px solid #ccc; border-radius:5px;">' +
                '<b>' + data.getValue(row, 0) + '</b><br/>' +
                'Tamaño real: ' + size + ' lineas<br/>' +
                'Complejidad (McCabe): <b style="color:red;">' + value + '</b> rutas logicas</div>';
        }
    }
</script>
</body>
</html>
