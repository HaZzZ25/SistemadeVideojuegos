<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario Usuario</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f4f4f4;}
        .form-container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); width: 400px;}
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;}
        .btn { padding: 10px 20px; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px;}
        .btn-guardar { background-color: #28a745; margin-bottom: 10px;}
        .btn-cancelar { background-color: #dc3545; display: block; text-align: center; text-decoration: none; box-sizing: border-box;}
    </style>
</head>
<body>
<div class="form-container">
    <h2 th:text="${user.id == null} ? 'Nuevo Usuario' : 'Editar Usuario'"></h2>

    <form th:action="@{/usuarios/guardar}" th:object="${user}" method="post">

        <input type="hidden" th:if="${user.id != null}" th:field="*{id}" />

        <label>Nombre de Usuario:</label>
        <input type="text" th:field="*{usuario}" required>

        <label>Contraseña:</label>
        <input type="password" th:field="*{password}" required>

        <label>Rol:</label>
        <select th:field="*{rol}" required>
            <option value="ADMIN">Administrador</option>
            <option value="EMPLEADO">Empleado</option>
        </select>

        <button type="submit" class="btn btn-guardar">Guardar</button>
        <a th:href="@{/usuarios}" class="btn btn-cancelar">Cancelar</a>
    </form>
</div>
</body>
</html>
